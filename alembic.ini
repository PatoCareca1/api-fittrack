# Alembic configuration file.

[alembic]
# Path to migration environment.
script_location = app/db/migrations

# Template used to generate migration file names.
# Uncomment to customise (default: %(rev)s).
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend — the project root is included automatically
# so that "app" package is importable.
prepend_sys_path = .

# The URL is set programmatically in env.py via app.core.config.settings.
# Leave this as a placeholder; it will NOT be used at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging ─────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
